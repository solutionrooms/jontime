<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>jontime</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }
        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 32px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            min-width: 380px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 28px;
        }
        h1 {
            text-align: center;
            font-size: 16px;
            color: #6a6a9a;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .gear-btn {
            position: absolute;
            right: 0;
            background: none;
            border: none;
            color: #555577;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .gear-btn:hover { color: #8888aa; }

        /* Main view */
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }
        .row:last-child { margin-bottom: 0; }
        .label-col {
            width: 130px;
            flex-shrink: 0;
        }
        .label-name {
            font-size: 14px;
            color: #c0c0d8;
            font-weight: 600;
        }
        .utc-offset {
            font-size: 11px;
            color: #555577;
            margin-left: 10px;
            white-space: nowrap;
        }
        .input-col {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }
        .time-input {
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 28px;
            width: 130px;
            text-align: center;
            background: #0f3460;
            border: 2px solid transparent;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 6px 8px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .time-input:focus {
            border-color: #533483;
            background: #122a52;
        }
        .time-input::placeholder {
            color: #334466;
            font-size: 18px;
        }
        .now-btn {
            display: block;
            margin: 24px auto 0;
            background: #533483;
            color: #d0d0e8;
            border: none;
            padding: 8px 28px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .now-btn:hover { background: #6a4c9c; }
        .now-btn:active { background: #472870; }

        /* Settings view */
        #settings-view { display: none; }
        .settings-row {
            background: #0f3460;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .settings-top {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .settings-arrows {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }
        .arrow-btn {
            background: none;
            border: 1px solid #333355;
            color: #8888aa;
            font-size: 10px;
            cursor: pointer;
            padding: 1px 5px;
            border-radius: 3px;
            line-height: 1;
        }
        .arrow-btn:hover { background: #1a1a4e; color: #c0c0d8; }
        .settings-label-input {
            font-family: inherit;
            font-size: 13px;
            width: 90px;
            background: #16213e;
            border: 1px solid #333355;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 5px 8px;
            outline: none;
        }
        .settings-label-input:focus { border-color: #533483; }
        .settings-tz-select {
            font-family: inherit;
            font-size: 12px;
            flex-grow: 1;
            background: #16213e;
            border: 1px solid #333355;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 5px 6px;
            outline: none;
            min-width: 0;
        }
        .settings-tz-select:focus { border-color: #533483; }
        .delete-btn {
            background: none;
            border: 1px solid #553333;
            color: #aa5555;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            line-height: 1;
        }
        .delete-btn:hover { background: #3a1a1a; color: #dd6666; }
        .settings-offset-row {
            display: flex;
            align-items: center;
            margin-top: 8px;
            padding-left: 30px;
            gap: 8px;
        }
        .settings-offset-row label {
            font-size: 11px;
            color: #555577;
        }
        .settings-offset-input {
            font-family: inherit;
            font-size: 13px;
            width: 80px;
            background: #16213e;
            border: 1px solid #333355;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 5px 8px;
            outline: none;
        }
        .settings-offset-input:focus { border-color: #533483; }
        .settings-bottom-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
        }
        .add-btn, .done-btn {
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 8px 22px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .add-btn {
            background: #1a3a5c;
            color: #8888cc;
        }
        .add-btn:hover { background: #224870; }
        .done-btn {
            background: #533483;
            color: #d0d0e8;
        }
        .done-btn:hover { background: #6a4c9c; }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            justify-content: center;
        }
        .share-btn {
            background: #1a3a5c;
            color: #8888cc;
            border: none;
            padding: 8px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .share-btn:hover { background: #224870; }
        .share-btn:active { background: #153050; }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #533483;
            color: #e0e0e0;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>jontime</h1>
            <button class="gear-btn" onclick="toggleSettings()">&#9881;</button>
        </div>
        <div id="main-view">
            <div id="zones"></div>
            <div class="btn-row">
                <button class="now-btn" onclick="setNow()">now</button>
                <button class="share-btn" onclick="shareLink()">link</button>
            </div>
        </div>
        <div id="toast" class="toast"></div>
        <div id="settings-view">
            <div id="settings-list"></div>
            <div class="settings-bottom-btns">
                <button class="add-btn" onclick="addZone()">+ add</button>
                <button class="done-btn" onclick="toggleSettings()">done</button>
            </div>
        </div>
    </div>
    <script>
        const DEFAULT_ZONES = [
            { id: 'z1', label: 'UTC',        tz: 'UTC' },
            { id: 'z2', label: 'UK',         tz: 'Europe/London' },
            { id: 'z3', label: 'IST',        tz: 'Asia/Kolkata' },
            { id: 'z4', label: 'US Central',  tz: 'America/Chicago' },
            { id: 'z5', label: 'US Eastern',  tz: 'America/New_York' },
            { id: 'z6', label: 'US Pacific',  tz: 'America/Los_Angeles' },
            { id: 'z7', label: 'PST',         tz: '__fixed__', fixedOffset: -480 },
        ];

        const TIMEZONE_OPTIONS = [
            { group: 'Fixed', options: [['__fixed__', 'Fixed UTC offset']] },
            { group: 'Universal', options: [['UTC', 'UTC']] },
            { group: 'Europe', options: [
                ['Europe/London', 'London (GMT/BST)'],
                ['Europe/Dublin', 'Dublin (IST/GMT)'],
                ['Europe/Paris', 'Paris (CET/CEST)'],
                ['Europe/Berlin', 'Berlin (CET/CEST)'],
                ['Europe/Amsterdam', 'Amsterdam (CET/CEST)'],
                ['Europe/Brussels', 'Brussels (CET/CEST)'],
                ['Europe/Zurich', 'Zurich (CET/CEST)'],
                ['Europe/Rome', 'Rome (CET/CEST)'],
                ['Europe/Madrid', 'Madrid (CET/CEST)'],
                ['Europe/Stockholm', 'Stockholm (CET/CEST)'],
                ['Europe/Oslo', 'Oslo (CET/CEST)'],
                ['Europe/Helsinki', 'Helsinki (EET/EEST)'],
                ['Europe/Athens', 'Athens (EET/EEST)'],
                ['Europe/Bucharest', 'Bucharest (EET/EEST)'],
                ['Europe/Istanbul', 'Istanbul (TRT)'],
                ['Europe/Moscow', 'Moscow (MSK)'],
            ]},
            { group: 'Asia', options: [
                ['Asia/Dubai', 'Dubai (GST)'],
                ['Asia/Karachi', 'Karachi (PKT)'],
                ['Asia/Kolkata', 'Kolkata / India (IST)'],
                ['Asia/Colombo', 'Colombo (IST)'],
                ['Asia/Dhaka', 'Dhaka (BST)'],
                ['Asia/Bangkok', 'Bangkok (ICT)'],
                ['Asia/Jakarta', 'Jakarta (WIB)'],
                ['Asia/Singapore', 'Singapore (SGT)'],
                ['Asia/Hong_Kong', 'Hong Kong (HKT)'],
                ['Asia/Shanghai', 'Shanghai (CST)'],
                ['Asia/Taipei', 'Taipei (CST)'],
                ['Asia/Seoul', 'Seoul (KST)'],
                ['Asia/Tokyo', 'Tokyo (JST)'],
            ]},
            { group: 'Australia / Pacific', options: [
                ['Australia/Perth', 'Perth (AWST)'],
                ['Australia/Adelaide', 'Adelaide (ACST/ACDT)'],
                ['Australia/Sydney', 'Sydney (AEST/AEDT)'],
                ['Australia/Melbourne', 'Melbourne (AEST/AEDT)'],
                ['Australia/Brisbane', 'Brisbane (AEST)'],
                ['Pacific/Auckland', 'Auckland (NZST/NZDT)'],
                ['Pacific/Fiji', 'Fiji (FJT)'],
                ['Pacific/Honolulu', 'Honolulu (HST)'],
            ]},
            { group: 'Americas', options: [
                ['America/Anchorage', 'Anchorage (AKST/AKDT)'],
                ['America/Los_Angeles', 'Los Angeles (PST/PDT)'],
                ['America/Phoenix', 'Phoenix (MST)'],
                ['America/Denver', 'Denver (MST/MDT)'],
                ['America/Chicago', 'Chicago (CST/CDT)'],
                ['America/New_York', 'New York (EST/EDT)'],
                ['America/Toronto', 'Toronto (EST/EDT)'],
                ['America/Halifax', 'Halifax (AST/ADT)'],
                ['America/St_Johns', 'St. John\'s (NST/NDT)'],
                ['America/Sao_Paulo', 'São Paulo (BRT)'],
                ['America/Argentina/Buenos_Aires', 'Buenos Aires (ART)'],
                ['America/Bogota', 'Bogotá (COT)'],
                ['America/Mexico_City', 'Mexico City (CST)'],
                ['America/Vancouver', 'Vancouver (PST/PDT)'],
            ]},
            { group: 'Africa', options: [
                ['Africa/Cairo', 'Cairo (EET)'],
                ['Africa/Lagos', 'Lagos (WAT)'],
                ['Africa/Nairobi', 'Nairobi (EAT)'],
                ['Africa/Johannesburg', 'Johannesburg (SAST)'],
                ['Africa/Casablanca', 'Casablanca (WET/WEST)'],
            ]},
        ];

        let zones = loadZones();

        function loadZones() {
            try {
                const saved = localStorage.getItem('jontime_zones');
                if (saved) return JSON.parse(saved);
            } catch (e) {}
            return JSON.parse(JSON.stringify(DEFAULT_ZONES));
        }

        function saveZones() {
            try { localStorage.setItem('jontime_zones', JSON.stringify(zones)); } catch (e) {}
        }

        function nextId() {
            return 'z' + Date.now() + Math.random().toString(36).slice(2, 6);
        }

        function getOffsetMinutes(tz) {
            const now = new Date();
            const utcParts = new Intl.DateTimeFormat('en-US', {
                timeZone: 'UTC', hour: 'numeric', minute: 'numeric',
                second: 'numeric', hour12: false, year: 'numeric',
                month: 'numeric', day: 'numeric'
            }).formatToParts(now);
            const tzParts = new Intl.DateTimeFormat('en-US', {
                timeZone: tz, hour: 'numeric', minute: 'numeric',
                second: 'numeric', hour12: false, year: 'numeric',
                month: 'numeric', day: 'numeric'
            }).formatToParts(now);

            function extract(parts) {
                const get = type => parseInt(parts.find(p => p.type === type).value, 10);
                return new Date(get('year'), get('month') - 1, get('day'),
                               get('hour') === 24 ? 0 : get('hour'), get('minute'), get('second'));
            }
            return (extract(tzParts) - extract(utcParts)) / 60000;
        }

        function getOffset(zone) {
            if (zone.tz === '__fixed__') return zone.fixedOffset || 0;
            return getOffsetMinutes(zone.tz);
        }

        function formatOffset(minutes) {
            const sign = minutes >= 0 ? '+' : '-';
            const abs = Math.abs(minutes);
            const h = Math.floor(abs / 60);
            const m = abs % 60;
            return 'UTC' + sign + String(h) + (m ? ':' + String(m).padStart(2, '0') : '');
        }

        function parseFixedOffset(str) {
            const s = str.trim();
            const m = s.match(/^([+-]?)(\d{1,2})(?::(\d{2}))?$/);
            if (!m) return null;
            const sign = m[1] === '-' ? -1 : 1;
            const hours = parseInt(m[2], 10);
            const mins = m[3] ? parseInt(m[3], 10) : 0;
            if (hours > 14 || mins > 59) return null;
            return sign * (hours * 60 + mins);
        }

        function formatFixedOffset(minutes) {
            const sign = minutes >= 0 ? '+' : '-';
            const abs = Math.abs(minutes);
            const h = Math.floor(abs / 60);
            const m = abs % 60;
            return sign + String(h) + (m ? ':' + String(m).padStart(2, '0') : '');
        }

        let lastEditedId = null;

        // ---- Main view ----
        function updateAll(sourceId) {
            lastEditedId = sourceId;
            const input = document.getElementById('t_' + sourceId);
            const val = input.value.replace(/[^0-9:]/g, '');
            const match = val.match(/^(\d{1,2}):(\d{2})$/);
            if (!match) return;

            const hours = parseInt(match[1], 10);
            const minutes = parseInt(match[2], 10);
            if (hours > 23 || minutes > 59) return;

            const source = zones.find(z => z.id === sourceId);
            const sourceOffset = getOffset(source);
            const utcMinutes = hours * 60 + minutes - sourceOffset;

            zones.forEach(zone => {
                if (zone.id === sourceId) return;
                const offset = getOffset(zone);
                const rawLocal = utcMinutes + offset;
                const localMinutes = ((rawLocal % 1440) + 1440) % 1440;
                const h = String(Math.floor(localMinutes / 60)).padStart(2, '0');
                const m = String(localMinutes % 60).padStart(2, '0');
                document.getElementById('t_' + zone.id).value = h + ':' + m;
            });
        }

        function setNow() {
            if (!zones.length) return;
            const now = new Date();
            const h = String(now.getUTCHours()).padStart(2, '0');
            const m = String(now.getUTCMinutes()).padStart(2, '0');
            const utcZone = zones.find(z => z.tz === 'UTC');
            const target = utcZone || zones[0];
            document.getElementById('t_' + target.id).value = h + ':' + m;
            if (utcZone) {
                updateAll(utcZone.id);
            } else {
                // No UTC zone; compute from first zone
                const offset = getOffset(target);
                const utcMins = now.getUTCHours() * 60 + now.getUTCMinutes();
                const localMins = ((utcMins + offset) % 1440 + 1440) % 1440;
                const lh = String(Math.floor(localMins / 60)).padStart(2, '0');
                const lm = String(localMins % 60).padStart(2, '0');
                document.getElementById('t_' + target.id).value = lh + ':' + lm;
                updateAll(target.id);
            }
        }

        function renderMain() {
            const container = document.getElementById('zones');
            container.innerHTML = '';
            zones.forEach(zone => {
                const offset = getOffset(zone);
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML =
                    '<div class="label-col">' +
                        '<div class="label-name">' + escHtml(zone.label) + '</div>' +
                    '</div>' +
                    '<div class="input-col">' +
                        '<input type="text" class="time-input" id="t_' + zone.id + '" placeholder="HH:MM" maxlength="5" />' +
                        '<span class="utc-offset">' + formatOffset(offset) + '</span>' +
                    '</div>';
                container.appendChild(row);

                const input = row.querySelector('input');
                input.addEventListener('input', function () { updateAll(zone.id); });
                input.addEventListener('keydown', function (e) {
                    if (e.metaKey || e.ctrlKey || e.key === 'Tab' || e.key === 'Shift' || e.key === 'Escape') return;
                    if (this.dataset.fresh !== '0') {
                        this.value = '';
                        this.dataset.fresh = '0';
                    }
                });
                input.addEventListener('focus', function () { this.dataset.fresh = '1'; });
                input.addEventListener('paste', function (e) {
                    e.preventDefault();
                    this.dataset.fresh = '0';
                    const raw = (e.clipboardData || window.clipboardData).getData('text');
                    const m = raw.match(/(\d{1,2}):(\d{2})/);
                    if (m) {
                        const hh = String(Math.min(parseInt(m[1], 10), 23)).padStart(2, '0');
                        const mm = String(Math.min(parseInt(m[2], 10), 59)).padStart(2, '0');
                        this.value = hh + ':' + mm;
                    } else {
                        const digits = raw.replace(/\D/g, '');
                        if (digits.length >= 3) {
                            const part = digits.length >= 4 ? digits.slice(0, 4) : digits.slice(0, 3);
                            const hh = part.length === 4 ? part.slice(0, 2) : '0' + part.slice(0, 1);
                            const mm = part.length === 4 ? part.slice(2, 4) : part.slice(1, 3);
                            const h = String(Math.min(parseInt(hh, 10), 23)).padStart(2, '0');
                            const mi = String(Math.min(parseInt(mm, 10), 59)).padStart(2, '0');
                            this.value = h + ':' + mi;
                        }
                    }
                    updateAll(zone.id);
                });
            });
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ---- Settings view ----
        function buildTzOptions(selectedTz) {
            let html = '';
            TIMEZONE_OPTIONS.forEach(group => {
                html += '<optgroup label="' + escHtml(group.group) + '">';
                group.options.forEach(opt => {
                    const sel = opt[0] === selectedTz ? ' selected' : '';
                    html += '<option value="' + escHtml(opt[0]) + '"' + sel + '>' + escHtml(opt[1]) + '</option>';
                });
                html += '</optgroup>';
            });
            return html;
        }

        function renderSettings() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            zones.forEach((zone, idx) => {
                const row = document.createElement('div');
                row.className = 'settings-row';

                const isFixed = zone.tz === '__fixed__';
                const offsetVal = isFixed ? formatFixedOffset(zone.fixedOffset || 0) : '';

                row.innerHTML =
                    '<div class="settings-top">' +
                        '<div class="settings-arrows">' +
                            '<button class="arrow-btn" data-dir="up" data-idx="' + idx + '">&blacktriangle;</button>' +
                            '<button class="arrow-btn" data-dir="down" data-idx="' + idx + '">&blacktriangledown;</button>' +
                        '</div>' +
                        '<input class="settings-label-input" type="text" value="' + escHtml(zone.label) + '" data-idx="' + idx + '" />' +
                        '<select class="settings-tz-select" data-idx="' + idx + '">' + buildTzOptions(zone.tz) + '</select>' +
                        '<button class="delete-btn" data-idx="' + idx + '">&times;</button>' +
                    '</div>' +
                    '<div class="settings-offset-row" style="display:' + (isFixed ? 'flex' : 'none') + '">' +
                        '<label>UTC offset:</label>' +
                        '<input class="settings-offset-input" type="text" placeholder="+5:30 or -8" value="' + escHtml(offsetVal) + '" data-idx="' + idx + '" />' +
                    '</div>';
                list.appendChild(row);
            });

            // Event delegation
            list.onclick = function(e) {
                const btn = e.target.closest('.arrow-btn');
                if (btn) {
                    const idx = parseInt(btn.dataset.idx);
                    const dir = btn.dataset.dir;
                    moveZone(idx, dir);
                    return;
                }
                const del = e.target.closest('.delete-btn');
                if (del) {
                    const idx = parseInt(del.dataset.idx);
                    zones.splice(idx, 1);
                    saveZones();
                    renderSettings();
                }
            };
            list.oninput = function(e) {
                const idx = parseInt(e.target.dataset.idx);
                if (isNaN(idx)) return;
                if (e.target.classList.contains('settings-label-input')) {
                    zones[idx].label = e.target.value;
                    saveZones();
                } else if (e.target.classList.contains('settings-tz-select')) {
                    const val = e.target.value;
                    zones[idx].tz = val;
                    if (val === '__fixed__') {
                        if (zones[idx].fixedOffset === undefined) zones[idx].fixedOffset = 0;
                    } else {
                        delete zones[idx].fixedOffset;
                    }
                    saveZones();
                    renderSettings();
                } else if (e.target.classList.contains('settings-offset-input')) {
                    const parsed = parseFixedOffset(e.target.value);
                    if (parsed !== null) {
                        zones[idx].fixedOffset = parsed;
                        saveZones();
                    }
                }
            };
        }

        function moveZone(idx, dir) {
            const newIdx = dir === 'up' ? idx - 1 : idx + 1;
            if (newIdx < 0 || newIdx >= zones.length) return;
            const tmp = zones[idx];
            zones[idx] = zones[newIdx];
            zones[newIdx] = tmp;
            saveZones();
            renderSettings();
        }

        function addZone() {
            zones.push({ id: nextId(), label: 'New', tz: 'UTC' });
            saveZones();
            renderSettings();
            // Scroll to bottom and focus the new label input
            const list = document.getElementById('settings-list');
            const lastRow = list.lastElementChild;
            if (lastRow) {
                lastRow.scrollIntoView({ behavior: 'smooth' });
                const inp = lastRow.querySelector('.settings-label-input');
                if (inp) { inp.focus(); inp.select(); }
            }
        }

        function toggleSettings() {
            const mainView = document.getElementById('main-view');
            const settingsView = document.getElementById('settings-view');
            if (settingsView.style.display === 'none') {
                mainView.style.display = 'none';
                settingsView.style.display = 'block';
                renderSettings();
            } else {
                settingsView.style.display = 'none';
                mainView.style.display = 'block';
                renderMain();
                setNow();
            }
        }

        // ---- Share / URL params ----
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function shareLink() {
            const zone = lastEditedId ? zones.find(z => z.id === lastEditedId) : zones[0];
            if (!zone) return;
            const input = document.getElementById('t_' + zone.id);
            if (!input || !input.value.match(/^\d{2}:\d{2}$/)) return;

            const tz = zone.tz === '__fixed__'
                ? 'fixed' + formatFixedOffset(zone.fixedOffset || 0)
                : zone.tz;
            const url = location.origin + location.pathname
                + '?tz=' + encodeURIComponent(tz)
                + '&t=' + encodeURIComponent(input.value);

            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
            } else {
                prompt('Share this link:', url);
            }
        }

        function loadFromUrl() {
            const params = new URLSearchParams(location.search);
            const tzParam = params.get('tz');
            const tParam = params.get('t');
            if (!tzParam || !tParam) return false;

            const tMatch = tParam.match(/^(\d{1,2}):(\d{2})$/);
            if (!tMatch) return false;
            const hours = parseInt(tMatch[1], 10);
            const minutes = parseInt(tMatch[2], 10);
            if (hours > 23 || minutes > 59) return false;

            // Determine the source offset
            let sourceOffset;
            const fixedMatch = tzParam.match(/^fixed([+-]?\d{1,2}(?::\d{2})?)$/);
            if (fixedMatch) {
                sourceOffset = parseFixedOffset(fixedMatch[1]);
                if (sourceOffset === null) return false;
            } else {
                try {
                    sourceOffset = getOffsetMinutes(tzParam);
                } catch (e) { return false; }
            }

            const utcMinutes = hours * 60 + minutes - sourceOffset;

            // Fill all zones from the computed UTC time
            zones.forEach(zone => {
                const offset = getOffset(zone);
                const rawLocal = utcMinutes + offset;
                const localMinutes = ((rawLocal % 1440) + 1440) % 1440;
                const h = String(Math.floor(localMinutes / 60)).padStart(2, '0');
                const m = String(localMinutes % 60).padStart(2, '0');
                document.getElementById('t_' + zone.id).value = h + ':' + m;
            });
            return true;
        }

        // ---- Service Worker ----
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        // ---- Init ----
        renderMain();
        if (!loadFromUrl()) setNow();
    </script>
</body>
</html>
